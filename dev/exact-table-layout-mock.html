<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Exact Table Layout Mock</title>
  <link rel="stylesheet" href="../styles/exact-table-layout-mock.css">
</head>
<body>
  <main class="exact-mock" aria-label="手描き設計図ベースの静的卓レイアウトモック">
    <section class="table-shell" data-layout-root>
      <div class="mock-meld-zone mock-meld-top" aria-label="CPU2の副露">
        <div class="mock-meld-list mock-rotate-top">
          <div class="mock-meld"><span>ポン</span><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-green.svg" alt="發"></div>
        </div>
      </div>

      <div class="mock-river-wrap mock-river-top" aria-label="CPU2の河">
        <div class="mock-river mock-rotate-top" data-river="top">
          <img src="../assets/tiles/man-1.svg" alt="1萬"><img src="../assets/tiles/man-2.svg" alt="2萬"><img src="../assets/tiles/man-3.svg" alt="3萬"><img src="../assets/tiles/pin-4.svg" alt="4筒"><img src="../assets/tiles/pin-5.svg" alt="5筒"><img src="../assets/tiles/pin-6.svg" alt="6筒">
          <img src="../assets/tiles/sou-1.svg" alt="1索"><img src="../assets/tiles/sou-2.svg" alt="2索"><img src="../assets/tiles/sou-3.svg" alt="3索"><img src="../assets/tiles/honor-east.svg" alt="東"><img src="../assets/tiles/honor-white.svg" alt="白"><img src="../assets/tiles/honor-red.svg" alt="中">
          <img src="../assets/tiles/man-7.svg" alt="7萬"><img src="../assets/tiles/man-8.svg" alt="8萬"><img src="../assets/tiles/man-9.svg" alt="9萬"><img src="../assets/tiles/pin-7.svg" alt="7筒"><img src="../assets/tiles/pin-8.svg" alt="8筒"><img src="../assets/tiles/pin-9.svg" alt="9筒">
        </div>
      </div>

      <div class="mock-seat mock-seat-top is-dealer" aria-label="CPU2席">
        <strong>西 CPU2</strong>
        <span>親</span>
      </div>

      <div class="mock-meld-zone mock-meld-right" aria-label="CPU1の副露">
        <div class="mock-meld-list mock-rotate-right">
          <div class="mock-meld"><span>チー</span><img src="../assets/tiles/pin-3.svg" alt="3筒"><img src="../assets/tiles/pin-4.svg" alt="4筒"><img src="../assets/tiles/pin-5.svg" alt="5筒"></div>
        </div>
      </div>

      <button class="mock-gear" type="button" aria-label="設定メニュー">⚙</button>

      <div class="mock-seat mock-seat-left is-turn" aria-label="CPU3席">
        <strong>北 CPU3</strong>
        <span>▶</span>
      </div>

      <div class="mock-river-wrap mock-river-left" aria-label="CPU3の河">
        <div class="mock-river mock-rotate-left" data-river="left">
          <img src="../assets/tiles/honor-north.svg" alt="北"><img src="../assets/tiles/honor-north.svg" alt="北"><img src="../assets/tiles/sou-4.svg" alt="4索"><img src="../assets/tiles/sou-5.svg" alt="5索"><img src="../assets/tiles/sou-6.svg" alt="6索"><img src="../assets/tiles/man-4.svg" alt="4萬">
          <img src="../assets/tiles/man-5.svg" alt="5萬"><img src="../assets/tiles/man-6.svg" alt="6萬"><img src="../assets/tiles/pin-1.svg" alt="1筒"><img src="../assets/tiles/pin-2.svg" alt="2筒"><img src="../assets/tiles/pin-3.svg" alt="3筒"><img src="../assets/tiles/honor-south.svg" alt="南">
          <img src="../assets/tiles/sou-7.svg" alt="7索"><img src="../assets/tiles/sou-8.svg" alt="8索"><img src="../assets/tiles/sou-9.svg" alt="9索"><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-red.svg" alt="中"><img src="../assets/tiles/honor-white.svg" alt="白">
        </div>
      </div>

      <section class="mock-score-board" aria-label="中央点数板">
        <div class="score score-top"><span>西</span><strong>25000</strong></div>
        <div class="score score-left"><span>北</span><strong>25000</strong></div>
        <div class="score-core">
          <strong>東1局</strong>
          <span>残り45</span>
          <span>王牌14</span>
          <span>ドラ 白</span>
          <span>親 西CPU2</span>
        </div>
        <div class="score score-right"><span>南</span><strong>25000</strong></div>
        <div class="score score-bottom"><span>東</span><strong>25000</strong></div>
      </section>

      <div class="mock-river-wrap mock-river-right" aria-label="CPU1の河">
        <div class="mock-river mock-rotate-right" data-river="right">
          <img src="../assets/tiles/pin-9.svg" alt="9筒"><img src="../assets/tiles/pin-8.svg" alt="8筒"><img src="../assets/tiles/pin-7.svg" alt="7筒"><img src="../assets/tiles/sou-6.svg" alt="6索"><img src="../assets/tiles/sou-5.svg" alt="5索"><img src="../assets/tiles/sou-4.svg" alt="4索">
          <img src="../assets/tiles/man-9.svg" alt="9萬"><img src="../assets/tiles/man-8.svg" alt="8萬"><img src="../assets/tiles/man-7.svg" alt="7萬"><img src="../assets/tiles/honor-east.svg" alt="東"><img src="../assets/tiles/honor-west.svg" alt="西"><img src="../assets/tiles/honor-red.svg" alt="中">
          <img src="../assets/tiles/pin-6.svg" alt="6筒"><img src="../assets/tiles/pin-5.svg" alt="5筒"><img src="../assets/tiles/pin-4.svg" alt="4筒"><img src="../assets/tiles/sou-3.svg" alt="3索"><img src="../assets/tiles/sou-2.svg" alt="2索"><img src="../assets/tiles/sou-1.svg" alt="1索">
        </div>
      </div>

      <div class="mock-seat mock-seat-right is-riichi" aria-label="CPU1席">
        <strong>南 CPU1</strong>
        <span>リーチ</span>
      </div>

      <div class="mock-meld-zone mock-meld-left" aria-label="CPU3の副露">
        <div class="mock-meld-list mock-rotate-left">
          <div class="mock-meld"><span>ポン</span><img src="../assets/tiles/honor-white.svg" alt="白"><img src="../assets/tiles/honor-white.svg" alt="白"><img src="../assets/tiles/honor-white.svg" alt="白"></div>
        </div>
      </div>

      <div class="mock-seat mock-seat-self" aria-label="自分席">
        <strong>東 自分</strong>
        <span>手番</span>
      </div>

      <div class="mock-river-wrap mock-river-self" aria-label="自分の河">
        <div class="mock-river" data-river="self">
          <img src="../assets/tiles/honor-south.svg" alt="南"><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-white.svg" alt="白"><img src="../assets/tiles/honor-white.svg" alt="白"><img src="../assets/tiles/honor-north.svg" alt="北"><img src="../assets/tiles/pin-8.svg" alt="8筒">
          <img src="../assets/tiles/pin-2.svg" alt="2筒"><img src="../assets/tiles/man-2.svg" alt="2萬"><img src="../assets/tiles/man-4.svg" alt="4萬"><img src="../assets/tiles/pin-4.svg" alt="4筒"><img src="../assets/tiles/man-6.svg" alt="6萬"><img src="../assets/tiles/man-6.svg" alt="6萬">
          <img src="../assets/tiles/sou-7.svg" alt="7索"><img src="../assets/tiles/sou-8.svg" alt="8索"><img src="../assets/tiles/sou-9.svg" alt="9索"><img src="../assets/tiles/honor-east.svg" alt="東"><img src="../assets/tiles/honor-red.svg" alt="中"><img src="../assets/tiles/pin-1.svg" alt="1筒">
        </div>
      </div>

      <section class="mock-actions" aria-label="操作ボタン">
        <div class="action-buttons">
          <button>ポン</button>
          <button>チー</button>
          <button>ロン</button>
          <button>見送る</button>
        </div>
        <div class="support-buttons">
          <button>助言</button>
          <button>役</button>
          <button>待ち</button>
        </div>
        <p>役なし</p>
      </section>

      <div class="mock-meld-zone mock-meld-self" aria-label="自分の副露">
        <div class="mock-meld-list">
          <div class="mock-meld"><span>ポン</span><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-green.svg" alt="發"><img src="../assets/tiles/honor-green.svg" alt="發"></div>
          <div class="mock-meld"><span>チー</span><img src="../assets/tiles/sou-3.svg" alt="3索"><img src="../assets/tiles/sou-4.svg" alt="4索"><img src="../assets/tiles/sou-5.svg" alt="5索"></div>
          <div class="mock-meld"><span>ポン</span><img src="../assets/tiles/man-7.svg" alt="7萬"><img src="../assets/tiles/man-7.svg" alt="7萬"><img src="../assets/tiles/man-7.svg" alt="7萬"></div>
        </div>
      </div>

      <section class="mock-hand-area" aria-label="自分の手牌">
        <div class="mock-hand-scroll">
          <button class="mock-hand-tile"><img src="../assets/tiles/man-2.svg" alt="2萬"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/man-3.svg" alt="3萬"></button>
          <button class="mock-hand-tile is-advice"><img src="../assets/tiles/man-4.svg" alt="4萬"><span>推</span></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/pin-4.svg" alt="4筒"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/pin-5.svg" alt="5筒"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/pin-6.svg" alt="6筒"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-3.svg" alt="3索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-4.svg" alt="4索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-5.svg" alt="5索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-7.svg" alt="7索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-8.svg" alt="8索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/sou-9.svg" alt="9索"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/honor-green.svg" alt="發"></button>
          <button class="mock-hand-tile"><img src="../assets/tiles/honor-green.svg" alt="發"></button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
