<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MVP-0.1 Test Runner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        background: #f6f7f9;
        color: #1f2933;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin: 20px 0;
      }

      .summary-item {
        border: 1px solid #d7dde5;
        border-radius: 6px;
        background: #ffffff;
        padding: 12px;
      }

      .summary-item strong {
        display: block;
        font-size: 24px;
      }

      .toolbar {
        margin: 16px 0;
      }

      button {
        min-height: 44px;
        border: 1px solid #1f2933;
        border-radius: 6px;
        background: #1f2933;
        color: #ffffff;
        padding: 0 16px;
        font: inherit;
        cursor: pointer;
      }

      .test-list {
        display: grid;
        gap: 8px;
        padding: 0;
        list-style: none;
      }

      .test-result {
        border: 1px solid #d7dde5;
        border-left-width: 6px;
        border-radius: 6px;
        background: #ffffff;
        padding: 12px;
      }

      .test-result.pass {
        border-left-color: #138a36;
      }

      .test-result.fail {
        border-left-color: #c2410c;
      }

      .test-result.pending {
        border-left-color: #8a6d13;
      }

      .test-name {
        font-weight: 700;
      }

      .test-message {
        margin-top: 4px;
        color: #52606d;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MVP-0.1 Test Runner</h1>
      <p>陞溷､慚夂ｹ晢ｽｩ郢ｧ・､郢晄じﾎ帷ｹ晢ｽｪ邵ｺ・ｪ邵ｺ蜉ｱ繝ｻ郢晄じﾎ帷ｹｧ・ｦ郢ｧ・ｶ陞ｳ貅ｯ・｡蠕後Θ郢ｧ・ｹ郢晏現縲堤ｸｺ蜷ｶﾂ・ｨame core隴幢ｽｪ陞ｳ貅ｯ・｣繝ｻ繝ｻ鬯・・蟯ｼ邵ｺ・ｯ隴幢ｽｪ陞ｳ貅ｯ・｣繝ｻ竊堤ｸｺ蜉ｱ窶ｻ髯ｦ・ｨ驕会ｽｺ邵ｺ蜉ｱ竏ｪ邵ｺ蜷ｶﾂ繝ｻ/p>

      <section class="summary" aria-label="郢昴・縺帷ｹ晁ご・ｵ蜈域｣｡郢ｧ・ｵ郢晄ｧｭﾎ懃ｹ晢ｽｼ">
        <div class="summary-item">
          <span>陷ｷ驛・ｽｨ繝ｻ/span>
          <strong id="total-count">0</strong>
        </div>
        <div class="summary-item">
          <span>隰御ｻ咏ｲ･</span>
          <strong id="pass-count">0</strong>
        </div>
        <div class="summary-item">
          <span>陞滂ｽｱ隰ｨ繝ｻ/span>
          <strong id="fail-count">0</strong>
        </div>
        <div class="summary-item">
          <span>隴幢ｽｪ陞ｳ貅ｯ・｣繝ｻ/span>
          <strong id="pending-count">0</strong>
        </div>
      </section>

      <div class="toolbar">
        <button id="run-tests" type="button">Run tests</button>
      </div>

      <ol id="test-results" class="test-list"></ol>
    </main>

    <script type="module">
      import { registerActionTests } from "./actions.test.js";
      import { registerCpuDiscardTests } from "./cpu-discard.test.js";
      import { registerDiscardAdviceTests } from "./discard-advice.test.js";
      import { registerHandSortTests } from "./hand-sort.test.js";
      import { registerMatchTests } from "./match.test.js";
      import { registerMatchUiTests } from "./match-ui.test.js";
      import { registerNextRoundTests } from "./next-round.test.js";
      import { registerReactionTests } from "./reaction.test.js";
      import { registerRonTests } from "./ron.test.js";
      import { registerRoundTests } from "./round.test.js";
      import { registerScenarioTests } from "./scenario.test.js";
      import { registerStorageTests } from "./storage.test.js";
      import { registerTileTests } from "./tiles.test.js";
      import { registerTsumoTests } from "./tsumo.test.js";
      import { registerWallTests } from "./wall.test.js";
      import { registerWinCheckTests } from "./win-check.test.js";
      import { registerYakuDisplayTests } from "./yaku-display.test.js";
      import { registerYakuIntegrationTests } from "./yaku-integration.test.js";
      import { registerYakuMessageTests } from "./yaku-message.test.js";
      import { registerYakuTests } from "./yaku.test.js";
      import { runTests, tests } from "./test.js";

      globalThis.__TEST_CACHE_BUST__ = "mvp15-cpu-evaluator-1";

      const totalCount = document.querySelector("#total-count");
      const passCount = document.querySelector("#pass-count");
      const failCount = document.querySelector("#fail-count");
      const pendingCount = document.querySelector("#pending-count");
      const resultList = document.querySelector("#test-results");
      const runButton = document.querySelector("#run-tests");

      registerTileTests();
      registerWallTests();
      registerRoundTests();
      registerActionTests();
      registerCpuDiscardTests();
      registerDiscardAdviceTests();
      registerHandSortTests();
      registerMatchTests();
      registerMatchUiTests();
      registerNextRoundTests();
      registerReactionTests();
      registerRonTests();
      registerScenarioTests();
      registerStorageTests();
      registerWinCheckTests();
      registerTsumoTests();
      registerYakuTests();
      registerYakuIntegrationTests();
      registerYakuDisplayTests();
      registerYakuMessageTests();

      function renderResults(results) {
        totalCount.textContent = String(results.length);
        passCount.textContent = String(results.filter((result) => result.status === "pass").length);
        failCount.textContent = String(results.filter((result) => result.status === "fail").length);
        pendingCount.textContent = String(results.filter((result) => result.status === "pending").length);

        resultList.replaceChildren(
          ...results.map((result) => {
            const item = document.createElement("li");
            item.className = `test-result ${result.status}`;

            const name = document.createElement("div");
            name.className = "test-name";
            name.textContent = `${result.status.toUpperCase()}: ${result.name}`;

            const message = document.createElement("div");
            message.className = "test-message";
            message.textContent = result.message || "";

            item.append(name, message);
            return item;
          })
        );
      }

      async function runAndRender() {
        runButton.disabled = true;
        runButton.textContent = "Running...";
        renderResults(await runTests());
        runButton.disabled = false;
        runButton.textContent = "Run tests";
      }

      runButton.addEventListener("click", runAndRender);
      totalCount.textContent = String(tests.length);
      runAndRender();
    </script>
  </body>
</html>
